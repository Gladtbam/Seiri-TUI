name: Build and Release DEB

on:
  push:
    tags:
      - 'v*' 

permissions:
  contents: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Debug

    - name: Test
      run: dotnet test --no-build --configuration Debug --verbosity normal

  build-deb:
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        debian: ['bullseye', 'bookworm', 'trixie']
    
    container:
      image: debian:${{ matrix.debian }}

    steps:
      - name: Install dependencies
        run: |
          cat /etc/os-release
          apt-get update
          apt-get install -y git curl wget clang zlib1g-dev dpkg-dev ca-certificates libicu-dev

      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install .NET SDK
        run: |
          wget https://dot.net/v1/dotnet-install.sh -O dotnet-install.sh
          chmod +x ./dotnet-install.sh
          ./dotnet-install.sh --channel 8.0 
          ln -s ~/.dotnet/dotnet /usr/bin/dotnet
      
      - name: Set version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ ! "$VERSION" =~ ^[0-9] ]]; then VERSION="0.0.1"; fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Publish AOT
        shell: bash
        run: |
          dotnet publish SeiriTUI/SeiriTUI.csproj \
            -c Release \
            -r linux-x64 \
            -p:PublishAot=true \
            -p:Version=${{ env.VERSION }} \
            --self-contained true \
            -o ./publish

      - name: Build DEB package
        shell: bash
        run: |
          mkdir -p package/usr/bin
          mkdir -p package/DEBIAN
          cp ./publish/SeiriTUI package/usr/bin/seiri-tui
          chmod +x package/usr/bin/seiri-tui

          # 生成 control 元数据
          cat <<EOF > package/DEBIAN/control
          Package: seiri-tui
          Version: ${{ env.VERSION }}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: gladtbam
          Description: Modern TUI tool for media file organization.
          EOF

          # 打包时在文件名中标记目标系统版本
          DEB_NAME="seiri-tui_${{ env.VERSION }}_debian-${{ matrix.debian }}-x64.deb"
          dpkg-deb --build package $DEB_NAME
          
          # 将生成的文件移到外层临时目录以便后续上传
          mv $DEB_NAME /tmp/$DEB_NAME

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: deb-debian${{ matrix.debian }}
          path: /tmp/seiri-tui_${{ env.VERSION }}_debian-${{ matrix.debian }}-x64.deb

  release:
    needs: build-deb
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all DEBs
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/*.deb
          generate_release_notes: true