name: Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      ver_base: ${{ steps.meta.outputs.ver_base }}
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Get metadata
      id: meta
      shell: bash
      run: |
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.1.0")
        SHORT_SHA=$(git rev-parse --short HEAD)
        VERSION="${LATEST_TAG#v}-$SHORT_SHA"
        VER_BASE="${LATEST_TAG#v}"
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
        echo "ver_base=$VER_BASE" >> $GITHUB_OUTPUT

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Debug

    - name: Test
      run: dotnet test --no-build --configuration Debug --verbosity normal

  build-artifact:
    name: Build DEB Artifact
    needs: test
    runs-on: ubuntu-latest
    container:
      image: debian:bullseye
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y git curl wget clang zlib1g-dev dpkg-dev ca-certificates libicu-dev

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install .NET SDK
        run: |
          wget https://dot.net/v1/dotnet-install.sh -O dotnet-install.sh
          chmod +x ./dotnet-install.sh
          ./dotnet-install.sh --channel 8.0 
          ln -s ~/.dotnet/dotnet /usr/bin/dotnet

      - name: Build and Package
        shell: bash
        run: |
          VERSION="${{ needs.test.outputs.version }}"
          VER_BASE="${{ needs.test.outputs.ver_base }}"
          SHORT_SHA="${{ needs.test.outputs.short_sha }}"
          
          echo "Building Version: $VERSION"
          
          dotnet publish SeiriTUI/SeiriTUI.csproj \
            -c Release \
            -r linux-x64 \
            -p:PublishAot=true \
            -p:Version-Suffix=$SHORT_SHA \
            -p:Version=$VER_BASE \
            --self-contained true \
            -o ./publish

          mkdir -p package/usr/bin
          mkdir -p package/DEBIAN
          cp ./publish/SeiriTUI package/usr/bin/seiri-tui
          chmod +x package/usr/bin/seiri-tui

          cat <<EOF > package/DEBIAN/control
          Package: seiri-tui
          Version: $VERSION
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: gladtbam
          Description: Modern TUI tool for media file organization. (CI Build: $VERSION)
          EOF

          dpkg-deb --build package seiri-tui-ci-x64.deb

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: seiri-tui-ci-deb
          path: seiri-tui-ci-x64.deb
