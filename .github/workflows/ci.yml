name: Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Debug

    - name: Test
      run: dotnet test --no-build --configuration Debug --verbosity normal

  build-artifact:
    name: Build DEB Artifact
    runs-on: ubuntu-latest
    container:
      image: debian:bullseye
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y git curl wget clang zlib1g-dev dpkg-dev ca-certificates libicu-dev

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install .NET SDK
        run: |
          wget https://dot.net/v1/dotnet-install.sh -O dotnet-install.sh
          chmod +x ./dotnet-install.sh
          ./dotnet-install.sh --channel 8.0 
          ln -s ~/.dotnet/dotnet /usr/bin/dotnet

      - name: Build and Package
        shell: bash
        run: |
          # 1. 获取最近的 Tag 并生成带 Hash 的版本号
          # 如果没有 tag，默认使用 0.1.0 加上 hash
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "0.1.0")
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="${LATEST_TAG#v}-$SHORT_SHA"
          
          echo "Building Version: $VERSION"
          
          # 2. Publish AOT
          dotnet publish SeiriTUI/SeiriTUI.csproj \
            -c Release \
            -r linux-x64 \
            -p:PublishAot=true \
            -p:Version-Suffix=$SHORT_SHA \
            -p:Version=${VERSION%-*} \
            --self-contained true \
            -o ./publish

          # 3. Build DEB package
          mkdir -p package/usr/bin
          mkdir -p package/DEBIAN
          cp ./publish/SeiriTUI package/usr/bin/seiri-tui
          chmod +x package/usr/bin/seiri-tui

          cat <<EOF > package/DEBIAN/control
          Package: seiri-tui
          Version: $VERSION
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: gladtbam
          Description: Modern TUI tool for media file organization. (CI Build: $VERSION)
          EOF

          dpkg-deb --build package seiri-tui-ci-x64.deb

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: seiri-tui-ci-deb
          path: seiri-tui-ci-x64.deb
